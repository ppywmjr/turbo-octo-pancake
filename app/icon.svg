<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Define the clipping path to keep the sunburst inside the rounded square -->
    <clipPath id="icon-bounds">
      <rect width="512" height="512" rx="96" ry="96" />
    </clipPath>
  </defs>

  <!-- Base Container with Rounded Corners -->
  <g clip-path="url(#icon-bounds)">
    <!-- Warm Sun Yellow Background -->
    <rect width="512" height="512" fill="#eed490" />

    <!-- Sunburst Rays (Rotated from the Center) -->
    <g fill="#fd8b09" opacity="0.4">
      <path d="M256,256 L0,216 L0,296 Z" />
      <path d="M256,256 L512,216 L512,296 Z" />
      <path d="M256,256 L216,0 L296,0 Z" />
      <path d="M256,256 L216,512 L296,512 Z" />
      <path d="M256,256 L0,86 L56,30 Z" />
      <path d="M256,256 L456,482 L512,426 Z" />
      <path d="M256,256 L426,0 L482,56 Z" />
      <path d="M256,256 L30,456 L86,512 Z" />
      <path d="M256,256 L0,148 L24,96 Z" />
      <path d="M256,256 L488,416 L512,364 Z" />
      <path d="M256,256 L364,0 L416,24 Z" />
      <path d="M256,256 L96,488 L148,512 Z" />
      <path d="M256,256 L0,364 L24,416 Z" />
      <path d="M256,256 L488,96 L512,148 Z" />
      <path d="M256,256 L148,0 L96,24 Z" />
      <path d="M256,256 L364,512 L416,488 Z" />
    </g>
  </g>

  <!-- Bold Black Letter C (Centred, Standard Geometric Curves) -->
  <text x="48%" y="58%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
        font-weight="800" 
        font-size="440" 
        fill="#3d1818">C</text>
</svg>
